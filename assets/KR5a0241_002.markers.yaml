  - {type: variant, offset: 4600, length: 300, content: 萬卷丹經要㫖畫圖立象本使人得象忘言後之學者皆泥象尋眞各求詭論豈知夫至道不繁樞紐陰陽而已矣如以天一生水云云之數而言此亦不過明水火之流行耳如以四時八節而言者此亦不過喻天地陰陽消長耳秘其母而言其子故知之者鮮矣用成今所以著爲此書者皆棄枝葉而言本根本根有而枝葉自芳蓋古人不欲言而余言之道中君子宜體此意母以小道觀焉依此而行神仙可立躋也或問爐鼎之體明矣爐鼎之用亦願聞焉天地間百卉草木萬類不殊冬至之後陽動於下則枯木重榮百草萌芽蟄蟲奮發萬類熙怡造化豈有心而生萬物萬物亦何心而望造化蓋一氣之動萬類感而然耳天何心哉物何心哉至于百卉開花結實之際正藥物循環之時落葉凋芳之際正藥物歸根復命之時可喻古人譬藥物產降而成丹莫有出於此者, CK-KZ: ''}
