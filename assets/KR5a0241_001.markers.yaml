  - {type: variant, offset: 494, length: 148, content: 書並悟眞篇等行於世自心爲至矣忽有客至訪余怪其狀貌非凡敬肅待之或問曰子於金丹之道訓人亦至矣但首尾未明機關尚隱後學何以爲識余自此亦不得已也天機至重玄律至嚴子固美言某敢不奉曰子但著爲一書盡底泄漏苟有譴焉某當其責余再拜敬服遂失所在余思此語故著此書天機泄則泄矣傳之者當以至寳拜受有玄律焉泄慢墮地獄禍及七祖翁, CK-KZ: ''}
