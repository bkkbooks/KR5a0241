front:
  text: 玉清金笥靑華秘文金寳内鍊丹訣卷下
  hash: sha256:6bd583bdf58599f359667183c11329fc00b6c72ad9ab66a0f91bf1364f61080d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0241_SJB_003-040373c, image: sjb/04/040373c.png}
body:
  text: 紫陽眞人張平叔撰前弦須短後弦長水裏藏燈焰自光日夜巽風吹不滅將心挑動更熒煌火候圖論易之爲書三百八十四爻火之爲數三百八十四銖故捨乾坤以爲鼎器坎離爲藥物之外初一用屯蒙初二用需訟初三用師比初四用小畜履初五用泰否初六用同人大有初七用謙豫初八用隨蠱而金計半斤初九用臨觀初十用噬嗑賁十一用剥復十二用無妄大畜十三用頤大過十四用咸恒十五用遯大壯十六用晋明夷十七用家人睽十八用蹇解十九用損益二十用夬姤二十一用萃升二十二用困井二十三用革鼎而水半斤二十四用震艮二十五用漸歸妹二十六用豐旅二十七用巽兌二十八用渙節二十九用中孚小過三十用旣濟未濟頃刻而周周而復始自日月運行一寒一暑天地氤氲萬物化醇倒造化翻乾坤竊宇宙盜陰陽天下之至通始可與言此也或曰乾坤坎離之體曰周天火候之時坎離交矣坎離交則乾坤會矣夫天道下降地道上升乃乾坤之用也坎者乾交坤也離者坤交乾也其他卦象不過設體耳亦不可泥象尋爻而火候之法始見又曰似子言之不過範圍天地運行日月而已而爐鼎圖又列八卦於鼎中火候圖又升午位於泥丸布平橋於卯酉何也曰天機固不容泄言旣至此隱之何爲且河出圖洛出書天尚自泄況於人乎客曰止余聞泄天機而殃及九祖獨不聞度一人而福及九祖乎吾以吾之丹法盡底無隱而傳於有縁之士苟有信士一人爲仙某豈無功乎客曰子之用心非某能知及之曰是爐也是鼎也乃進火進水之理耳水火無過一氣耳氣之升也吾以心接之即火也氣之降也吾以靜持之即水也此綿綿若存之時子午進用之功也斯時也方是偃月爐具之時夫性見則氣生氣生則金生金生則氣多氣多則金愈旺此二者交相爲用也金旺於中燭破浮雲露出一鈎眞性如月之明乃偃月爐也存養之久則金氣盛而全盡燭見一輪眀月乃全性也既見全性又返金性則吾身皆眞性命爲之主此用火之時也蓋二者未融爲一而用火鍊之鍊作純金也包合性命通體皆陽浮沉自在愛日戀月好游頂門時至道成奮厲而脱霹靂一聲身非我有吁嘻人人可以如此而成功人而自棄之若是可哀也哉余見總篇方其九轉既周沐浴已竟火力終焉一星不滅故動一風以吹之巽風者鼎下之片縷耳闔則爲乾闢則爲巽闔則爲噓闢則爲吸何以能開闢亦無非一意使之然或曰巽西方之位以子所言巽乃中宫母乃反乎曰西方者巽之用也中宫者巽之體也吾自心生一意而降於巽位其象始闢則吾言實兼體用而訓也繼之以乾乾金而火乃金精故遇而炎火張設須坎以抑之抑之而不能止則有反攻于下之患故止以艮而又噓以巽巽上一畫屬陽止火非陽不行故遇震而稍焰遇離而復炎又止以坤坤水也火從水起如遇其兌故不止而自止坤非正卦故徐歸于兌兌又西方之卦也故自尾閭徐徐升上而至泥丸頂爲天門爲正午之地午屬火火遂加煌又接之以心心火也接者神也乃神火也又加煌至卯酉若直下則刑德臨門危其殆哉故一立而各爲二道今日之卯酉昔日之坤艮也火氣也氣降而復升之理故歸于腎府化爲頁水而用之蓋文火性柔而難化遇卯木木必尅土遂以火尅木則土不受尅矣武火性强而易化降自酉酉屬金金生水遂爲水歸於鼎曰何謂文何謂武曰文火自三關上至于天矣武火是午宫與心火也大凡火候只此一場大有危險丹士宜一戰而勝則天下定矣平日周天火候切不可以爲則然此亦不可執著彼亦不可執著且喜且喜慶雲開盡現洪濛彷彿空中見祖宗風定七星還在水依稀殘韻尚飄空陰盡圖論張子一日坐于幽室形忘氣化倏然兩耳風生始知秋蟬鳴隔岸之翠柳終焉若聞九天之簫韻恍然有一人立于旁耳目口鼻與張無異指張而駡曰吾自太易以來爲子所役略不瞬寧何罪於汝張子不覺失笑而無聲默謂之曰來吾與爾言汝言固是但爾爲我苦耶我爲爾若耶姑坐以叙曰我先以來本無事與子同居之後寤寐亦相持移像累劫而不自如置我沙漠風霜之地既令我歸東又令我歸西種種相魔自頃以來始蒙慧以室廬養以調息美則美矣但晚也張曰匪吾之過也乃六欲之賊使之然也子微而隱彼顯而彰吾知有彼而不知有此譬之瞽者坐舟但知舟之日去千里而不知撑者實勞也使不欲舟行則撑者暇矣似張者欣然曰幾失君吾有百鍊之堅刀可同勦此賊而去其根後同入規中時然後行獨步金闕張曰唯唯見黄光四迸五色煥然觀者聽其言曰去賊之道不宜急急則反受其敵始然力不勝其禍乃可必縱放任余心守之常將息或作狡詐形視之常無爾一戰定三清萬魔俱屛迹噫當日風塵枉自横波平海晏兆升平堪憐不達窮通者猶弄干戈觀我城噫無明焰子又無煙煅出眞金曜徹天霹靂一聲圓活子騰空三覲玉皇前陽純圖論又無文看甚窈窕仙童捧詔來妙哉總論金丹之要夫人一身大而不可以取象天地包容萬彙變化莫測靈通玄妙百姓日用而不知故金丹之道鮮矣夫金丹之道貴乎藥物藥物在乎精氣神神始用神光精始用精華氣即用元氣精非氣不盈神非氣不充精因氣融氣憑精用氣因神見神憑氣用且以吾身之天地言之自太極旣分兩儀判矣兩儀生四象四象生八卦八卦立而天地人之道備矣天以動爲體地以靜爲體天地之氣往來不息而日月行乎其中蓋父母構形育我之後始生脉絡也自形完之後始生縷絡反若元性之虚無穀道筋條殆似草茅之育茂此乃先天之炁爲先天之道此金寳之至言也宜守之以中則庶乎道路通暢蓋人受天地之中以生所謂命也得天地之中氣以生遂可爲人我以身爲天地亦宜執其中而爲造化之樞紐中者有三中心中意臍中鼎腎中爐三中之至切者心中意臍中鼎次之腎中爐又次之此三者自金丹之始至終不可須臾離也大凡金丹之道學者尋五行其末矣當知夫交㑹之際恍惚杳冥養生毛竅金之本也逸豫和暢肢體柔順木之本也鉛本火體而金情汞本水體而木性無他水火者鉛汞之體也金木者鉛汞之用也鉛汞凝結光華會合者意也意屬土五行旣全於鼎器之中物以類聚五行又環列於鼎器之外内外相感而丹始成形狀如黍米非青非黄非黑非白不可得而名狀也到此際又綿綿若存清淨無爲自然現出百般妙用景象腎水合精水自玄膺流下謂之華池神水虚無之中白雪生而黄芽長只綿綿若存之頃亦率歸于鼎器之内是大藥不離精氣神要認始用藥材又精氣神之所產也非便用精氣神也今有一等旁門自作自是而精氣神受役之不暇奚能產藥也精氣神三者孰爲重曰神爲重金丹之道始然以神而用精氣也故曰神爲重神者性之别名也至靜之餘元氣方產之際神亦欲出急庸定以待之不然是散而無體之體也苟誇出入必爲大道則誰不可爲夫神不疾而速不行而至師言曰神之妙用無方而有限若得其道可以出入切不可縱爲良深蓋收於内則可豈宜縱於外也夫神出而依林木以成形陰未盡也將出之際多異景目光燁然從目出也鼻氣或吸從鼻出也耳聞清音從耳出也獨不可從口出入者何也夫口五臟之氣所㑹也神棄精氣而竊出避氣盛之地也神氣精常想戀神一出二者無依焉故神之出也有害無益日居月諸照臨下土丹士逆之爲用順而爲火夫火循環九轉中九轉九轉初生旺於第一轉伺陰氣盡又遶第二轉餘亦如之至于九轉周足遂迫於鼎故用前進火工夫謂之眞陽而戰羣陰請明言之人一身皆屬陰惟有一點陽耳我以一點之陽自遠之近轉之又轉戰退羣陰則陽道日長陰道日消故易曰龍戰于野其血玄黄至于陰盡陽純而丹始能升於泥丸决然奮厲眞人於斯而始見矣金丹之道如此而已更有言不盡底丹之初成也交合之際未免藉陰陽二炁以成之後則漸以陽火鍊成純陽之體故自强不息乾道也丹成矣故凝神以成軀而成仙丹之初成也藉五行以成其用後則漸以眞金養成純金之體故通體之光金色也金變日色故光金象日性故剛曰金丹又曰金仙幻體雖假合之物脩丹之士須藉以養丹基譬之地也城池固則外邪不能入故綿綿若存之頃脾胃合爲一脉而圍丹穴之左肺肝合爲一脉圍丹穴之右頁氣徹至則環於脉絡之中故近丹而氣可得之以化至寳舉其一可知二然亦無爲自然始舉是以明矣夫無爲無有爲也夫人之一氣在身由念而動譬之握拳念欲開而五指伸了無罣碍學人達此於采先天一氣之時行一眞念采一眞氣按圖觀象落在黄庭其理一也窮冬凋剥必得陰陽交泰之後乃至萬象學人達此當知交㑹之後不期產物之產而自產矣金之在水其耀奪目金之在土土能藏之蓋產於幽處而隱其眀處也丹之居鼎猶人君之在位百官稱職其國自安而民自安火候藥物各得其宜則萬化成何謂各得其宜第一轉產藥於東而降於西以心爲斗柄斡旋其機故行二十度而魄滿又斡之二十度而魂滿則火之魂而水之魄立而神用大矣他轉如之舉其要而明者言曰斗極建四時八節無不順斗極實兀然魁杓自後動只要兩眼皎上下交相用須向靜中行莫就忙裏送要無形圖與你看一氣周流歸故宅金丹何事却成功至道本不繁庸人自生事我本遇師傳三囑令深秘何故畫圖並立論毫釐說盡鬼神驚咄地獄不因傳道者教存經籍度三師次第秘訣癸待坐靜打頑空仰息守己生時聞命炁沖和待氣動方可如下行存歸然後就上二竅直衝五星候見明放靜又觀心放下了一段候再見明一陽眞炁產矣綿綿若存只只八分小光透用機出入開道一回然後方行子午大光透用機出入破頂一回此是後上前下此後並係尾閭五星於三十日見用機出入上弦五十日足見機大凡三遭望左右見機下弦曰數足下明鼎内晦用機再朝天逕以太和返太極以太和返無極動靜之機氣盛則抑之以靜氣弱則助之以意火候秘訣丹居鼎内上水下火心動屬火靜屬水乃水鼎也底靜屬水動屬火乃火鼎也陽在鼎下曰水火升於鼎上則水火也陽火是外爐外爐與火存於氣穴黃庭正在氣穴之上氣穴乃内爐也内爐存火近鼎常烹此綿綿若存也火長進於下則不可坐至於子午二時午進火子進水陽生不以心擾接之意斡歸於右轉降于左存入反是則進火或曰敢問九轉之功曰三月火候乃九轉第一轉初自脇邊左右存爲火道自陽宫起自右邊到肩橫過正中凝自左邊送下遂綿綿若存宜靜不宜動宜徐不宜急動曰扇火急曰傷丹此每日子時之功也第二轉自脇邊進一寸二分用如前法此丑時之用功也第三轉自脇邊進五分用法如前此寅時之用功也沐浴卯時火起取丹計四寸有縷二條正爲火道脉透鼎中故火起不用目不用心以意斡之右轉取橫與鼎齊正縷地也遂大靜火遂爲水而歸于鼎丹遂沐浴綿綿若存天機天機宜秘宜秘第四轉進一寸用法如前此辰時之用功也第五轉進五分用法如前此已時之用功也第六轉抽添進五分火自下與午時心火頂火俱旺故陽生小抑之抽也再生則火微矣直上于左而橫過恰值心遂逢心火火其炎矣此抽添也第七轉進五分用如前法此未時之用功也第八轉沐浴行左降右取丹方一寸未時之火道皆至陰之道也火力過而衰值申道亦陰道無他心上道陽道也心下道陰道也二時火皆從陰道過至酉而始金旺故靜以待之火爲金液而歸于鼎丹遂沐浴卯沐浴乃益汞酉沐浴是益鉛第九轉取丹五分而已頃刻用而即定以待第十轉亥用巽風起火行運火之法見火候之圖火氣認著採取圖天向一中分造化右意意意陽生左人從心上起經綸玉清金笥青華秘文金寳内鍊丹訣卷下
