front:
  text: 他不得其杳然遂滅所執之燭煬而退邦叔大窘坐五更大悟通體汗流待旦以頌呈先生月照長江風浪息魚龍遁迹水天平箇中誰唱眞仙子聲滿虛空萬籟淸先生覽之問曰誰唱誰聽邦叔遂答以詩曰莫問誰莫問誰一聲高了一聲低阿誰唱阿誰聽橫竪大千說不盡先生有意度迷徒急撞靈臺安寶鏡鏡明澄靜萬緣空百萬絲條處處通斗轉星移人睡定覺來紅日正當中先生出金丹圖傳與邦叔遂止羅浮後十三年坐化又十年眉山大溈和尙沈志靜遇之封山自稱王邦叔今居蓬萊望海樓也
  hash: sha256:65ec69f73ef1c8a4c6cc2644b93bdd1f79484ee78299cdbe0e4e87d20b9ed76b
