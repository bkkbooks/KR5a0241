body:
  text: 奏表臣不避雷鉞之誅輙伸干瀆念臣處世多虞凡有所爲爲必顚躓年邁三旬獨於大道有緣囘思穹蒼昔日使我無成者正祐今日之有成也竊見下民孰無道器奔勞塵境戕伐一元愈降愈下棄人就物就物思人則不可得而返矣物不能修終乎異類哀哉臣之身自弗能度反憐及此固無異泥中蛙而哂籬上雞也唯某昨傳受靑華眞人玉淸金笥長生度世金寶内煉丹訣簡而易行詳而不雜身裏分陰陽之主壺中立四象之樞三中常守以爲機一定不離而作用用中無用靜裏常存哲人秀士一覽無疑造化在掌中矣欲齋沐精思著爲圖論毫髮無隱直泄至眞之奥旨擇其可傳者而傳之得接續心燈流傳萬世眞美事也然始傳之際誓語至嚴䝉師至囑輕泄犯刑數欲作而踟蹰不知其幾伏惟太上好生度人爲重是用俯伏塵埃冥心上界欲望天慈鑒臣之意若其不允立彰玄譴如或諒容俾臣安靜庶幾敢踐斯言復陳天陛俯伏茅蘆恭伺天罰三旬不至始敢齋沐焚香精思著述三日而成秘諸法笥以待賢者謹錄上奏伏望天慈俯垂赦宥使人人依此鍊成金寶超出塵埃世世相傳無有泄慢臣無任誠惶誠恐頓首百拜以聞玉淸金笥靑華秘文金寶内鍊丹法金丹圖圖玄之又玄心爲君論心者神之舍也眾妙之宗而宰萬物性在乎是命在乎是學道之士先須了得這一箇字其餘皆後段事矣故爲之論張子野身披百衲自成都歸於故山築室於山靑水綠之中萬物罄然而怡怡若有所得客傳於市曰遭貶張平叔歸山矣從游之士叢然而立於庭且泣且拜曰先生固無恙乎且奔涉山川逾越險阻者於兹十年而貌不少衰形不少疲者其有術乎張子曰吁吾與汝言人之所以悴憔枯稿者誰使之然心也百事集心一念未己一念續之盡日之中全無暇刻宵之寐也心亦少寍但神不存矣吾無他術爲能定心夫神鬼之所以測度者吾心之有念耳心無念則神之靈不可得而知也豈惟神不知吾心吾亦自不知其爲心乃定之根本也弟子曰然則金丹之士其靜心乎勿靜心乎曰能靜則金丹可坐致也但難耳曰夫子與人言金丹之道使人心中生意心意爲造化之主心其能靜乎曰心爲何而動寂然不動感而遂通乃吾心之用也夫斗極之北辰固未始動其所以爲動者拱辰之星耳拱辰之星固不能不動其所以動者辰爲樞而運之耳唯其不動之中而有所謂動者丹士之用心也唯其動之中而存不動者仁者之用心也於不動之中終於不動者土木之類也心居於中七竅屬之皆未可盡其妙用其所以爲妙用者但神服其令氣服其竅精從其召神服其令者心勿馳於外則神反藏於内氣服其竅者心和則氣和氣和則形和形和則天地之和應矣故盛喜怒而氣逆者喜怒生乎心也精從其召者如男女媾形而精蕩亦心使之然也心淸卽念淸念淸則精止吁心惟靜則不外馳心惟靜則和心惟靜則淸一言以蔽之曰靜精氣神始得而用矣精氣神之所以爲用者心靜極則生動也非平昔之所謂動也用精氣神於内之動也精固精氣固氣神亦可謂性之基性則性而謂之基者何蓋心靜則神全神全則性現又一言以蔽之曰靜其所以爲靜者蓋亦有理順水行舟滔滔騰拔欲往海島不曰勞形一旦思鄕急駕歸帆求風逆返還家固靜之道但久違而始復久失而始尋一旦欲靜其可得乎當思歸靜之由然後能靜旣悟昨非當求今是非固常爲是在何處詩曰自下金梯墮碧崖囘思閬苑幾花開向來大道今何在野草不除荆棘堆口訣但於一念妄生之際思平日心不得靜者此爲梗耳急捨之久久純熟則自靜矣夫妄念莫大於喜怒怒裏囘思則不怒喜中知抑則不喜種種皆然久而自靜豈獨坐時平日提百萬强兵但事至則理事過則休亦可爲靜之本以此靜心應事接物誰云誤事實自靈耳故曰以事鍊心情無他用鏡能察形不差毫髮形去而鏡自鏡蓋事至而應之事去而心自心也口訣中口訣心不留事一靜可期此便是覔靜路詩曰得路欲歸休問遠看看信步莫煩心雲收將放金烏見一點靈光眼内明心之所以不能靜者不可純謂之心蓋神亦役心心亦役神二者交相役而欲念生焉心求靜必先制眼眼者神遊之宅也神遊於眼而役於心故抑之於眼而使之歸於心則心靜而神亦靜矣頌曰目不亂視神返於心神返於心乃靜之本神爲主論心爲君者喻人君在位以無爲而治天下則天下安以有爲而治天下則天下亂蓋心者君之位也以無爲臨之則其所以動者元神之性耳以有爲臨之則其所以動者欲念之性耳有爲者日用之心無爲者金丹之心以有爲反乎無爲然後以無爲而蒞事金丹之入門也夫神者有元神有慾神元神者乃先天以來一點靈光也慾神者氣質之性也父母媾形而氣質具於我矣將生之際而元性始入父母以情而育我體故氣質之性每遇物而生情今則徐徐剗除主於氣質盡而本元始見本元見而後可以用事無他百姓日用乃氣質之性勝本元之性善反之則本元之性勝氣質之性以氣質之性而用之則氣亦後天之氣也以本元之性而用之則氣乃先天之氣也蓋氣質之性本微自有生以來日長日盛日用常行無非氣質一旦反之自今以往先天之氣純熟日用常行無非本體矣餘見神室圖論氣爲用論先天氣後天氣得之者如癡如醉忘寢失寐吁元神見則元氣生元氣之生周流乎身而獨於腎府採而用之者何夫腎府路逕直達氣穴黃庭者一也賢爲精府精至直引精華而用之二也周流於他處則難至精府而可識三也心氣透腎意下則直至採之者易爲力四也有此四者故採眞陽於腎府精從氣說神有元神氣有元氣精得無元精乎蓋精依氣生精實腎宫而氣融之隨氣而昇揚爲鉛精失而元氣不生元陽不見何益於我哉元神見而元氣生元氣生則元精産意爲媒說意者金丹之道自始至終作用不可離也意生於心然心勿馳於意則可心馳於意末矣坎離說坎者腎宫也離者心田也坎靜爲水乃也動屬火乃一也離動爲火乃也靜屬水乃也交會之際心田靜而腎府動得非眞陽在下而眞陰在上乎况意生乎心而直下腎府乎陽生於腎而直升於黃庭乎故曰坎離顚倒若不顚倒而順行則心火動而不靜大地成火坑矣餘見交會圖下手工夫訣心始欲靜而欲念未息欲念者氣質之性所爲也此性役眞性常切於目耳次之修丹之士心旣無事則彼固無由而役之矣其所以役神者以外物誘之耳靜坐之際先行閉息之道閉息者人之息一息未已一息續之今則一息旣生而抑後息後息受抑故續之緩緩焉久而息定抑息千萬不可動心動心則逐於息息未止而心已動矣言未旣有笑於傍者曰迂哉抑息而又不動心是以千鈞之物責負於人使之不用力可乎曰吾雖閉息而又存心則心不動而息亦息矣曰此固閉息之道安保欲念不生乎曰至於生則末矣念之生也感物而動耳定中覺目有所覩則神役於目矣急收而返視耳有所聽神役於耳矣急收而内聽其他皆然笑者曰聞一知二吾併知此理矣吾雖收神而又存心則神收而心本靜矣曰存心者養性也性之始見不存心則無所養無所養則終乎不見存心實自收心始所謂收神者蓋收心之餘用耳行之至久見如不見聞如不聞形心相忘合乎至道則元性露而元氣生矣凝神說神者元性也余前神爲主論蓋亦盡矣今念修丹者多昧凝神之法凝神之法不在乎速故又爲之說而畫神室圖并著論於後凝者以神凝於精氣之内也精氣本相依而神亦戀之今獨重於神何神者精氣之主丹士交會採取至於行火無非以神而用精氣茍先以神凝於氣之中則氣未可安神亦未肯戀氣而反害藥物矣且神元性也性方尋見尙搖搖未定而使之凝豈能自凝其所凝者亦氣質之性也初以氣質之性而尋本性反以氣質之性而逐本性可乎哉世之學者多爲凝神所誤何也蓋所謂凝神者息念而返神於心耳神歸於心則性之全體見全體見而用之無非神用念念不離金丹故丹成而神自歸之何凝之有故曰凝神者神融於精氣也精氣神合而爲一而陽神産矣到此乃知此身爲無用之物也誰曰不然吾聞於度師度師聞於遠師聞於天幻丹說丹有幻丹者蓋學道之士不知正理未靜心田遽採一陽一陽雖生非其陽也精非元精乃淫泆之精氣非元氣乃呼吸之氣神亦非元神乃欲念之神夫人方學道便欲爲仙得非欲念乎以欲念而交會陽生幻丹之所以有也精在腎府而遽採之升於臍上無安頓處故逐氣而息於氣穴之右與氣交結而止卽自曰丹雖自曰丹矣精氣神用著便是後天之物先天之物果安在哉夫謂之黃庭内爐外爐泥丸等竅皆先天立之後始見實未之有也傍風捉影入海尋蟾守株待兎緣木求魚一旦敗露精蕩然而去先天無所主矣嗚呼非長生之丹乃促命之法也又有採氣而上遇心血氣血凝而爲物亦曰幻丹若此者眾故舉以辨惑捉丹法丹居内有走失亦可捉乎曰有然非丹之走失也門戸不堅而出也幻丹則有走失金丹安有此患曰金丹之出何以知之曰丹在鼎中備五行之正氣吾身五行之氣迫爐則相感而動一旦覺氣升鼎外而内無相感乃丹不存也急須放下一場大靜并所謂爐鼎與丹之在不在俱付之無何有或一日或一夜始覺其在何處或在心或在肝或在脾與腎身中百竅皆可藏知其在彼處遂綿綿若存而守之勿使之再去他處又一日之久始以意採之則直降於陽宫又就陽宫如採取之時用意遂從舊逕直升於鼎矣造化玄微至此茍有云云者吾之師也神水華池說神水者卽木液之謂也華池者臍中氣穴之下兩腎中間一竅絕肖黃庭穀氣就此而生精醫家所謂精穴者是也斯竅也少壯之士陽盛氣融則神水華池不過澆灌爐鼎洗滌脾胃周流潤澤氣穴而已元氣衰微精元枯竭者皆藉此以爲丹本何也華池之竅乃生精而降於腎者也氣壯則精多精多則華盛用之如有餘氣凋之士精元稿矣穀氣所臨不過産一等欷欷之水流歸腎府耳我旣能靜元氣本無增減但華池之水無矣大藥三品而欠其一故於陽生未採之時以意斡歸尾閭自夾脊直透至泥丸就精穴用精自然隨氣而升至午宫遇眾陽融之則精始可用然後降至於心就心取汞依然下至黃庭精卽落乎其中卻用一意封固綿綿若存以養之二者自相吞㗖而丹始成近浙西一派雖少壯之士亦用此法而結丹道在邇求諸遠耳然各執其是而已
