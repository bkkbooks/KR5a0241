body:
  text: 百竅說人之一身毛竅八萬四千氣宫三百八十四毛竅㪚屬氣宫臍中氣穴又爲三百八十四宫之主降於陽宫皆爲精心爲中田頂爲上田舌下有玄膺目中有銀海額之中眉之間口鼻之衝耳目之畔咽喉之側腰脅中皆竅也余所謂丹之出此竅皆可藏豈曰人身止有一二竅一二竅者眾竅之樞紐耳此言其體用別著於後採取圖圖採取論採者採眞陽於腎府取者取眞汞於心田可以採則採採之必得其用非其時而採之則龍不降虎不升惟見血氣奔馳衝衝來往迷者以爲交姤矣而不知坎中之眞陽離中之眞陰自兀然也至於氣脈爲一念所止則氣疾入脈絡之中坎離之内反有傷於鉛汞雖曰養氣實所以喪元氣耳夫元氣之在人至靜始見是先天之氣也此氣與後天之氣時刻循環略定之際心無他用始知氣之上下遂錯採以爲先天致反有害所以學道者常有奇疾蓋爲此也夫人之疾病氣脈爲梗耳氣本自調而役之使升則傷脾胃肝肺耳目口鼻降則如決水長堤銳然而下趨沛乎其不可禦至眞之物其能存乎余爲此憫故畫採取圖直泄天機刀圭玄黃嬰兒姹女諸般譬喻盡掃而去使賢者見之而參同愚者見之泮然冰釋分分朗朗如寶鑑之察形洞見毫髮金丹之士先修陰德以盡人事然後持前心論則大藥産而圖形見矣採取之法生於心心者萬化樞紐必須忘之而始覔之忘者妄心也覔者眞心也但於忘中生一覔意卽眞心也恍惚之中始見眞心眞心旣見就此眞心生一眞意加以反光内照庶百竅備陳元精吐華要在乎無中生有有中生無到這境界併眞心忘而棄之我以無而待則眞息綿綿眞息綿綿之時後天之氣以定後天隱則先天之氣見故陽生焉陽生者先天之氣自氣穴中流出而至於腎中如噴泡然蓋兩腎中間有一縷透氣穴乃父母交姤之後始生脈絡也故先天之氣游之旣覺如此則一身百脈盡若春生春意融而漸長此時先天之體始立先天立而後天愈退藏矣然後可以微動採取之意意者以目垂觀於心卻以心放下送入陽宫徐收而又縱則陽起矣採之之意生於心生於目故老子曰吾嘗觀心得道亦至目靈夫眞息旣定内光乃神光此心乃眞心眞心生意神光燭心故嘗爲之說曰目視心心生意意採鉛若陽生未融盛而遽採之則一念住採意旣萌後天復起故曰了命實關於性地性者凡有所相皆是虛妄旣無著相則虛妄除而眞理顯矣眞理方明而一念生豈非復爲虛妄之相乎故伺陽長而始採則勃然而升先天氣盛而後天伏矣採之升也實有異焉醺然而升至臍而稍上徐止臍之上則息方凝名曰鉛鉛金也金生水故汞產於心雲從龍風從虎之理兆矣風平而雨降自然鉛汞相投相吞相㗖金生水水生木木又生火木愛金而金戀木乃交會之道也金本尅木反有愛戀之意焉蓋金木之本性耳夫乃先天也五行在何處但不如是則不能達其理採取之道旣明交會之理復露再有叮囑採取不可太緩太緩則老而不可用而後天之氣雜矣當以交會論參看詩曰醺醺和氣釀春風一點陽生恍惚中無自有生無勝有色從空裏色成空升於臍上鉛情見產自心源汞性通定裏見眞眞裏定坎離交會雨濛濛又詩曰木爲龍兮金爲虎坎戸生男引離女要知造化有根源不離眞火生於子交會圖圖交會論恍惚中有象杳冥中有物古先哲嘗持此以警學者蓋恍惚杳冥定之象也惟定可以鍊丹不定而陽不生陽生之後不定而丹不結故纔以意採鉛而遽止其意止有時而升有刻蓋始生無過一氣耳升於臍則爲鉛鉛升則止其意鉛自能引汞汞自能尋鉛恍惚杳冥之中交姤之理畢矣採取交會口訣忘裏覓覓裏忘忘中見見中忘陽生矣忘中採採中忘忘裏升升裏見見裏變鉛成矣定中起意中升忘中用鉛引汞矣鉛合汞於内精會神於外交會矣鉛汞精神合而爲一卻將一念使之落黃庭歸鼎矣口訣中口訣打合鉛汞須用意動採一陽須用以靜而生定莫怪平叔多兜攬卻縁學者盡癡迷咦滿眼天花散亂飛門前流水浪聲微靑驄載取靑娥去頃刻靑驄獨自歸靑娥何在巫峽雲生十二峰故宮簫管寂寥中星橋路隔靑山外若要相逢永不逢是性又是命或問孰爲交姤曰採取圖心下一竅乃交會之地不可以有形求不可以無形取但鉛升之際陽氣上又自氣穴降入一陽宮我採以意汞降之際會氣降爲蓋汞自鉛生鉛升於臍上爲精光所燭故曰鉛鉛猶表也汞猶影也表動影隨故汞降亦如之陽鉛之升不可謂之純陽中含精光爲鉛蓋亦屬陰陰汞之降不可謂之純陰心生汞心爲神舍汞遇神光而後可用蓋亦屬陽陽中有陰陰中有陽二氣交感凝結不散遂成玄珠如黍米又問鉛乃一陽一陽乃先天一氣耳汞以何物爲之曰鉛與汞皆先天之物鉛乃先天氣汞乃先天靈氣乃命之母靈乃性之子可以曰鉛汞可以曰性命諸得道之宗師誰肯直泄至此又問曰心下一竅何竅也曰混沌神房乃精華目光之氣幻而爲之華騰爲光垂爲精雖元精然無日用之精則元精不見譬如有水則潮興白氣未聞白氣興於地也水乃精也白氣乃華也神雖元神然日用之神不役然後元神見譬之皓月當天雲收而光始下燭淸淨卽無雲也垂光卽照臨也精雖屬陰而精華屬陽目光屬陽而照於内則亦屬陰光華相遇而成一竅以氣感氣使二物會於其中工夫周足遂爲眞人蓋生生之意寓於此矣所以能靈而神也然則交會之後安得此珠落於黃庭歸於鼎内曰二物聚時情性合五行全矣虎歸於山龍歸於淵目光還而精氣復此落於黃庭歸於鼎内會有關捩子麽恍恍惚惚萬孔生春祕祕祕又問陽生於上遽止其意安保不復降曰大哉問黃庭之下有一丹室之門戸意生則上故陽升意止則一陽卽不可得而降矣爐鼎則在乎一之内正屬土故備五行之正氣成天地之全形也或問爐鼎之法曰黃庭之在人身一陽上升如珠落於其中如此卽爐鼎也黃庭同屬土至於中之中蓋屬土中之土也故落於其中而成鼎器五行各厚其基何謂厚其基夫母求子子戀母丹之法也皆取其本然之性旣歸於鼎而各趨之如子之戀母故靜坐之中神光下垂則歸於鼎精華上升亦如之至於行住坐臥如龍養珠如雞抱卵而氣各歸一身之脈絡務在勿忘勿助長耳學道之士然乎不然乎某之丹法若是而已矣詩曰何勞姹女與嬰兒透徹分明說與伊身裏乾坤顚倒處壺中日月運行時要知一者爲陽用須識其中作氣機天使紫陽來說盡後來何必更尋師直泄天機圖圖到這田地知這道理且莫歡喜咄未知如何寶劒沈埋古嶽邊虹光夜夜上衝天虎龍戰罷三田靜何處求他汞與鉛嗄嗄嗄嘻嘻嘻且休認鹿爲馬一箇玄珠在泥底詩曰牛女橋邊路不通河車運去杳無蹤憑誰問得眞消息吹徹重關藉巽風直泄天機論金丹之圖旣成天機尤祕且論五行之顚倒述水火之流行明藥材之進退體日用之循環此書直泄天機動見毫髪化頑石而成金點瓦礫而成玉夫兩目爲役神之舍顧瞻視矚神常不得離兩耳爲送神之地百里之音聞於耳神隨之而去兩鼻爲勞神之位隨感而辨薰蕕辨之者誰神也使耳目口鼻皆如眉則神安而全不爲後天亦不勞修煉大抵忘於目則神歸於鼎而視於内蓋綿綿若存之時目垂而下顧也忘於耳則神歸於鼎而聞於内綿綿若存之時耳内聽於下也忘於鼻則神歸於鼎而吸於内蓋眞息旣定之時氣歸元海之理合而言之俱忘俱歸於鼎而合於内矣口訣雞能抱卵心常聽或問金丹之道耳目口鼻固亦得聞之矣心固不言可知也肝膽脾胃肺腎無用之物無用之中而有功者何予答之曰此須已到而後知其理吾初從師亦叩此矣師贈我以詩曰五湖風景闊漫漫鷺立沙灘宇宙寛畫出枉勞君指點異時遊到儘堪看余初未達此理後到此田地始信師言之不我欺余以師之不言者並言之夫五行之用不可缺一故綿綿若存之頃脾氣與胃氣相接而歸於心縷肝氣與膽氣相接從大小腸接於腎縷肺氣伏心氣而通於鼻是氣也腎脾定後元氣周流自東而西自南而北之氣也西南乃氣之會氣合而歸於此卻自夾脊直透上中丹田而降於腎腑兩腎中間有治命橋一帶故寒山子曰上有棲神窟橫安治命橋氣降至於此陽氣盛而上衝與此氣相接於一則周圍於鼎器之外日用之則日增經營之力鄞鄂之成實肇於此忽然有一物超然而出不内不外金丹之事到此則一半矣超然而出者乃玄關一竅也其大無外其小無内有形之中也無形之中也先就有形之中尋無形之中乃因命而見性也就無形之中尋有形之中乃因性而見命也先性故難先命則有下手處譬之萬里雖遠有路可通先性則如水中捉月然及其成功一也用力到者自知其然未見不必存之以有恐至着相或又曰子畫圖中多有竅何也曰斯竅也非採取交會之竅也蓋一陰一陽之謂道往來不可窮用之則充塞於一身之中不用則歸藏於心田之一了無形像然則何物耳祕意之主耳左屬陽右屬陰疑祕祕祕祕到這裏方是返太極處曰返太易者自太極返太極者自太和致太和者自陰陽始故曰陰陽和而風雨時嘉禾生大衍之數五十天一地二天三地四天五地六天七地八天九地十天數二十五地數三十合爲五十有五去五以象五行者後之鼎内外是也又就其中尅一象太極之不動其用四十有九又就其中尅一以爲鄞鄂其用四十有八學人行爐鼎用火之法以四卦爲主以六十卦爲用四卦者乾坤坎離也又以大衍圖求其象則循環之理明矣周天之法泄矣如或未明請看爐鼎圖論云蟾光圖圖詩曰一點蟾光照太虛金蟆水裏吸還噓高低猶是純陰體何是生陽用有餘蟾光論太虛寥廓皓月粲然雪浪翻騰金蟆吐耀人見月之用而曰金精盛則月明孰知金之所以生者自月而產也人知金之產於月而不知月之明本於日也月喻元性水喻坎宮金蟆者喻一點眞陽之竅也月喻元性者性之用也性之初見如星圓陀陀光爍爍未足以見性氣質之性稍息而元性略見如雲開則月見合則亦然時時存之則見未見時無以異也故金丹之士纔見此物分明便是元氣產矣遂從而用之譬之見賊便捉毌使再逸若以之收於鼎器之中則一點元氣之眞終不得出矣以丹田爲日以心中元性爲月日光自返照月蓋交會之後寶體乃生金也月受日氣故初三生一陽一陽者丹旣居鼎覺一點靈光自心常照而無晝夜也自一陽生至於月之八日而二陽產矣二陽者丹之金氣少旺而元性又少現也自二陽生至於月之望日而三陽純矣三陽純者元性盡現卽前無形之中也一陽生時覺吾身有一物或明或隱二陽生時則遍體生明矣三陽生時則光不在内不在外覺此身如在虛空無身無虛空亦無日無月矣嘗能如此則禪定但丹士若生於有不能採眞空而以無爲用也旣至於此而金丹且半何也元神見矣而未歸丹鼎混精氣而爲一所以爲半更說他後一半底道理月旣望矣十六而一陰生一陰者性歸於命之始也自一陰生至於月之二十三而二陰產矣二陰者乃性歸於命之二也自二陰生至於月之三十日而三陰全矣三陰者乃性盡歸於命也性之全體見於綿綿若存之時則性反於命内矣方其始也以命取性性全矣又以性安命此是性命大機括處所謂性命雙修者此之謂也到此際則金丹以全始行火候養之百日而嬰兒產矣月明實本於金金之性實出於月百鍊愈堅萬劫不壞蓋金日色月性也火日氣金入火而復於元性之眞可以鍊成至寶號爲金液還丹修丹者始則取金爲金生水交合之理顯而藉土以成之城廓基址無非托眞金爲藥而固濟隄防鍊成純金故曰金丹爐鼎圖圖詩曰鼎爐形象恁分明八卦縱橫用則親鍊就五行全藉土又令眞土變眞金爐鼎論鼎之爲器匪金匪鐵爐之爲具匪玉匪石黃庭爲鼎氣穴爲爐黃庭正在氣穴之上縷絡相連是爲爐鼎以陰陽爲炭烹之鍊之夫黃庭在人身交會之頃元氣方生之際此時正開而丹落於其中宜遂固守所謂水銀實滿葫蘆裏閉塞其口置深水也水銀汞也葫蘆黃庭也深水猶氣也閉塞黃庭隱藏丹母而置於氣會之地萬氣歸鼎而封固愈密烹鍊愈堅此爐鼎之所以名也但不可泥於無心亦不可泥於有心惟在綿綿若存知其無守其有知其白守其黑靜中行火候定裏結還丹神室圖圖詩曰費盡工夫結得成返光内照景分明主人未至誰藏得聞道靈光駕赤城神室論神室者元神所居之室鄞鄂是也人知立鄞鄂之造化抑不知有室而無主人何取其爲室哉然主人雖無而主人之胎亦在乎一室之中矣如懷孕然十月之間母呼亦呼母吸亦吸但氣未足耳氣足而形完一點靈光入於其中則倏然而生矣此乃鄞鄂成而神歸於室之時神歸其室所謂得一萬事畢也蓋交媾之後神光垂而燭乎玄珠矣精華上升產玄珠矣精氣神亦先有胚胎在其中矣火足氣充則元精元氣元神合而爲一嬰兒產矣嬰兒豈自產火爍羣陰胎始脫到此方是產嬰兒吾嘗謂古人畫鍊丹之圖象固鄞鄂也知此一點當安遂不知安一點於中之道暫結終散猛火空燒而離坎逸矣夫此一點產於外而順於後天者一生二二生三三生萬物皆從乎此常人爲之志士反焉逆之而產於内則長生久視之道存矣豈非歸根復命乎歸根復命深根固蒂也深根固蒂之道自澄心遣欲始澄心之理屏視去聽如孔子所謂非禮勿視非禮勿言非禮勿聽非禮勿動便是眞道修丹之士以眞心幷爲妄心混然返其初而原其始卻就無妄心中生一眞心始有爲而終則至於無爲也若釋氏之所謂眞心則又異焉放下六情了無一念性地廓然眞元自見一見之頃往來自在蓋靜至於極之極
