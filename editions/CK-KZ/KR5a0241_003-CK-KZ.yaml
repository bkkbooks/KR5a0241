front:
  text: 故見太極如大死一場再生相似然後可以造化眞機而爲不生不死之根本豈易窺其門戸耶
  hash: sha256:c7a6d954b4051152c3872dabcc12cd9000b9f8d6da3dce439994e8e22d71805e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0241_CK-KZ_01p027b, image: JY174/CK-KZ_JY174_01p027b.png}
body:
  text: 火候圖圖詩曰前弦須短後弦長水裏藏燈熖自光日夜巽風吹不滅將心挑動更熒煌火候論易之爲書三百八十四爻火之爲數三百八十四銖故除乾坤以爲鼎器坎離以爲藥物初一用屯蒙初二用需訟初三用師比初四用小畜履初五用泰否初六用同人大有初七用謙豫初八用隨蠱初九用臨觀初十用噬嗑賁十一用剝復十二用無妄大畜十三用頤大過十四用咸恆十五用遯大壯十六用晉明夷十七用家人暌十八用蹇解十九用損益二十用夬姤二十一用萃升二十二用困井二十三用革鼎二十四用震艮二十五用漸歸妹二十六用豐旅二十七用巽兌二十八用渙節二十九用中孚小過三十用旣濟未濟頃刻一周周而復始倒造化翻乾坤竊宇宙盜陰陽達天地之至道始可與言此也或問乾坤坎離之體曰周天火候之時坎離交矣坎離交則乾坤交矣坎者乾交坤也離者坤交乾也其他卦象不過自此而設耳客曰似子言之止是範圍天地運行日月而爐鼎圖又列八卦於鼎中火候圖又升五位於泥丸布平橋於卯酉何也曰是爐也是鼎也乃進火進水之理耳水火無過一氣氣之升也吾以心接之卽火也氣之降也吾以靜待之卽水也此綿綿若存之時子午進用之功也斯時也方是偃月爐具之時夫性見則氣生氣生則金生金生則氣多氣多則金愈旺此二者交相爲用也金旺於中燭破浮雲露出一鈎眞性如月之明乃偃月爐也存養之久則金氣勝而盡燭見一輪明月乃全性也旣見全性又返金性則吾身皆眞性命爲主此用火之時也蓋二者未融爲一而用火鍊之鍊作純金也包含性命通體皆陽浮沈自在愛日戀月好遊頂門時至道成奮勵而脫霹𩆝一聲身非我有吁嘻人人可以如此成功而自棄之可哀也哉餘見總篇方其九轉旣周沐浴已竟火力終焉一星不滅故動巽風以吹之巽風者鼎下之片縷耳闔則爲乾闢則爲巽闔則爲噓闢則爲吸何以能開闢亦無非一意使之然或曰巽西方之位以子所言巽乃中宮毋乃反乎曰西方者巽之用也中宮者巽之體也自心生一意而降於巽位其象始闢則實兼體用而言矣繼之以乾乾金而火乃金精遇炎火張設須坎以抑之抑之而不能止則有反攻於下之患故止以艮而又噓以巽巽上一畫屬陽其火非陽不行故遇震而稍發遇離而復炎又止以坤坤水也火從水起遇兌兌又西方之卦也故自尾閭徐徐升上而至泥丸頂爲天門爲正午之地午屬火遂加煌又接之以心心火也接者神也乃神火也又加煌至卯酉若直下則刑德臨門危其大哉故一候而各爲二道今日之卯酉昔日之坤艮也火氣也氣降而復升故歸於腎府化爲眞水而用之蓋文火性柔而難化遇卯木必尅土遂以火尅木則土不受尅矣武火性强而易化降自酉酉屬金金生水歸於鼎曰何謂文何謂武曰文火自三關上至於天矣武火是午宮與心火也大凡火候只此一場大有危險丹士宜一戰而勝則天下定矣平日周天火候切不可以爲則然此亦不可執著彼亦不可執著詩曰慶雲開盡現鴻濛彷彿空中見祖宗風定七星還在水依稀殘韻上飄空陰盡圖圖陰盡論張子一日坐於幽室形忘氣化倏然兩耳風生始如秋蟬鳴隔岸之翠柳終焉若聞九天之簫韶恍然有一人立於旁耳目口鼻與張子無異指張子而駡曰吾自太易以來爲子所役略不少甯何罪於汝張子不覺失笑而無聲默謂之曰來吾與爾言汝言固是然爾爲我苦耶我爲爾苦耶姑坐以敘曰我先本無事與子同居之後寤寐相持置我沙漠風霜之地旣令歸東又令歸西種種相魔自頃以來始蒙惠以室廬養以調息美則美矣但晚也張曰匪吾之過乃六慾之賊使之然也子微而隱彼顯而彰吾知有彼而不知有此譬之瞽者坐舟但知舟之日去千里而不知撑者實勞也使不欲舟行則撑者暇矣似張者欣然曰幾失君吾有百鍊之堅刀可戰此賊而去其根同入規中時然後行獨步金闕張子曰唯唯見黃光四迸五色煥然觀者聽其言曰去賊之道不宜急急則反受其敵始然力不勝其禍乃可必縱放任余心守之常將息或作或輟形視之常無爾一戰定三淸萬魔俱屏迹詩曰當日風塵枉自橫波平海晏兆升平堪憐不達窮通者猶弄干戈觀我城陽純圖圖詩曰無明熖子又無烟煅出眞金耀徹天霹𩆝一聲圓活子騰空三覲玉皇前陽純論又無文看甚窈窕仙童捧詔來妙哉總論金丹之要夫人身大可以取象天地包容萬𢑥變化莫測靈通玄妙百姓日用而不知故金丹之道鮮矣夫金丹之道貴乎藥物藥物在乎精氣神神始用精華氣卽用元氣精非氣不盈神非氣不充精因氣融氣憑精用氣因神見神憑氣用宜守之以中則庶乎道路通暢蓋人受天地之中氣以生所謂命也得天地之中氣以生遂可爲人我以身爲天地亦宜執其中而爲造化之樞紐中者有三中心中意臍中鼎腎中爐三中之至切者心中意臍中鼎次之腎中爐又次之此三者金丹自始至終不可須臾離也學者不知止尋之五行末矣當知夫交會之際恍惚杳冥痒生毛竅金之本情也逸豫和暢肢體柔順木之本性也鉛本火體而金情汞本水體而木性無他水火者鉛汞之體也金木者鉛汞之用也鉛汞凝結光華會合者意也意本屬土五行旣全於鼎器之中物以類聚五行又列於鼎器之外内外相感而丹始成形如黍米非靑非黃非黑非白不可得而名狀也到此際綿綿若存淸淨無爲自然現出百般妙用景象矣腎水合精水自玄膺流下謂之華池神水虛無之中白雪生而黃芽長綿綿若存之頃亦悉歸於鼎器之内是大藥不離精氣神要認始用藥材又精氣神之所產也非便用精氣神也精氣神三者孰爲重曰神爲重神者性之別名至靜之餘元氣方產之際神將欲出急定以待之不然是散而無體之神苟誇出入以爲大道則誰不可爲夫神不疾而速不行而至師言曰神之妙用無方而有限若得其道可以出入切不可縱蓋收於内則可豈宜縱於外也夫神出而依林木以成形陰未盡也將出之際多異景目光燁然從目出也鼻氣或吸從鼻出也耳聞淸音從耳出也獨不可從口出入者何夫口五臟之氣所會神棄精氣而竊出避氣盛之地也神氣精常相戀神一出二者無依焉故神之出也有害無益日居月諸照臨下土丹士逆之爲用順而爲火夫火循環九轉中九轉九轉初生旺於第一轉伺氣盡又遶第二轉餘亦如之至於九轉周足遂迫於鼎故用前進火工夫謂之眞陽而戰羣陰請明言之人一身皆屬陰惟有一點陽耳我以一點之陽自遠之近轉之又轉戰退羣陰則陽道日長陰道日消故易曰龍戰於野其血玄黃至於陰盡陽純而丹始能升於泥丸決然奮厲眞人於斯而始見矣更有言不盡處丹之初成也交合之際未免藉陰陽二炁以成之後則漸以陽火鍊成純陽之體故自强不息乾道也丹成矣凝神以成軀而爲仙丹之初成也藉五行以成其用後則漸以眞金養成純金之體故通體之光金色也金變日色故光金象日性故剛名曰金丹又曰金仙幻體雖假合之物修丹之士須藉以養丹基譬之城池固則外邪不能入故綿綿若存之頃脾胃合爲一脈而圍丹穴之左肺肝合爲一脈而圍丹穴之右眞氣透徹則環於脈絡之中故近丹之氣亦可得之以化至寶舉其一可知其二然亦自無爲自然始夫無爲無有爲也人之一氣在身由念而動譬之握拳念欲開而五指伸了無罣礙學人達此於採先天一氣之時行一眞念採一眞氣按圖觀象落在黃庭其理一也窮冬凋剝必得陰陽交泰之後乃生萬象學人達此當知交會之後不期藥物之產而自產金之在水其耀奪目土能藏之蓋產於幽處而隱於明處也丹之居鼎猶人君之在位百官稱職其國自安火候藥物各有其宜第一轉產藥於東而降於西以心爲斗柄斡旋之機故行二十度而魄滿又二十度而魂滿則火之魂水之魄立而神用大矣他轉如之舉其要以付學者詩曰斗極建四時八節無不順斗極實兀然魁杓自移動只要兩眼皎上下交相用須向靜中行莫就忙裏送次第祕訣靜坐打頑空抑息守己生時命炁冲和待氣動方可如下行存歸然後就上二竅直冲五星候見明則放靜又觀心放下了一段候再見明一陽眞氣產矣採取交姤綿綿若存小光透用機出入開道一回然後方行子午大光透用機出入破頂一回此是後上前下此後並係尾閭五星於三十日見用機出入上弦十五日足見機大凡三遭望七十日左右見機下弦日數足只下明鼎内晦用機再朝天逕以太和返太極以太極返無極否泰動靜之機氣盛則抑之以靜氣弱則助之以意火候祕訣丹居鼎内上水下火心動屬火靜屬水乃水鼎也靜屬水動屬火乃火鼎也陽在鼎下曰水鼎升於鼎上則火鼎也陽火是外爐外爐之火存於氣穴黃庭正在氣穴之上氣穴乃内爐也内爐有火近鼎常烹此綿綿若存也火長進於下則不可坐至於子午二時午進火子進水陽生不以心擾接之意斡歸於右轉降於左存入反是則進火或曰敢問九轉之功曰三月火候乃九轉第一轉初自脇邊左右存爲火道自陽宮起自右邊到肩橫過正中凝住卻自左邊送下遂綿綿若存宜靜不宜動宜緩不宜急曰扇火急傷丹此每日子時之功也第二轉自脇邊進一寸二分用前法此丑時之用功也第三轉自脇邊進五分用法如前法此寅時之用功也卯時火沐浴卯時火起取丹計四寸有縷二條正爲火道脈透鼎中故火起不用目不用心以意斡之右轉取橫與鼎正縷地也遂大靜火遂爲水而歸於鼎丹遂沐浴綿綿若存天機天機宜祕宜祕第四轉進一寸用法如前此辰時之用功也第五轉進五分用法如前此巳時之用功也第六轉抽添進五分火自下與午時心火頂火俱旺故陽生小抑之抽也再生則火微矣直上於左而橫過恰値心遂逢心火而共降於右若下火不抽上逢心火第七轉進五分用如前法此未時之用功也第八轉行左降右取丹方一寸未時之火道皆至陰之道也火力過而衰値申道亦陰道無他心上道陽道也心下道陰道也二時火皆從陰過至酉而始金旺故靜以待之火爲金液而歸於鼎丹遂沐浴卯沐浴乃益汞酉沐浴乃益鉛第九轉取金丹五分而已頃刻用而卽定以待第十轉用巽風起火行運火之法見火候圖
