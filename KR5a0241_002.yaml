body:
  text: 紫陽真人張平叔撰採取圖論探者探頁陽於腎府取者取真汞於心田可以探則探探之必得其用非其時而探之則龍不降虎不升雖見血氣奔馳衝衝來往迷者以為交姤矣抑不知離坎自離坎陰中之真陽陽中之頁陰自兀然耳至於氣脉為一念所止則氣疾入脉絡之中離坎之內反有傷於鉛汞雖曰養氣要於中實所以喪元氣也夫元氣之在人至靜始見是先天之氣也後天之氣時刻循環但人汨於欲而不知詳審耳至於略定之際心無他用則方知其氣之上下遂錯探以為先天致返加害所以近世之學道者常有奇疾蓋為此也夫人之疾病但氣脉為梗耳氣本自調而若役之使之升則傷脾胃肺肝耳目口鼻降則如决水於長堤鋭然而下趍沛乎其不可禦也至真之物其能存乎余憫此等言丹之士故畫探取圖為於第一雖直泄天機但人有志於金丹而反戕其性命余救之以正理太上好生必不我罪故此篇畫以刀圭玄黃嬰兒姹女諸般譬設盡掃而退三舍使賢者見之而參同愚者見之泮然冰釋分分朗朗如寶鑑之察形洞見毫髮矣金丹之士先修陰德以盡人事然後持前心論則大藥産而圖形見矣探取之法生于心心者萬化綱維樞紐必須忘之而始覓之忘者忘心也覓者真心也但於忘中生一覓意即真心也恍惚之中始見真心真心既見就此真心生一真意加以反光內照庶百竅備陳元精吐華矣要在乎無中生有有中生無到這境界併真心俱忘而棄之也我以無待己則真息綿綿頁息綿綿之時後天之氣以定後天隱則先天之氣見故陽生焉陽生者先天之氣自氣穴流出則至于腎中如噴泡然蓋兩腎中間有一縷透氣穴乃父母交姤之後始生脉絡也故先天之氣遊之既覺如斯則一身百脉盡若春生春融融而漸長此時先天之氣始立先天立而後天愈退藏矣然後可以微動探取之意意者以目垂觀於心却以心放下送入陽宫徐收而又縱則陽起矣餘見一陽論探之意生于心心生于目故老子曰吾嘗觀心得道亦至靈夫真息既定內光乃神光此心乃真心真心生意神光燭心故常為之說曰目視心心生意意採鉛若陽生未融盛而遽探之則一念探意既萌後天復起故曰了命實關于性地性者凡所有相皆是虛妄既無著相則虛妄除而真理顯矣真理方明而一念生豈非復其虛妄之相乎故伺陽長而始探則勃然而升先天氣盛而後天伏不暇矣採之升也實有異焉醺然而上至于臍而稍止徐止臍之上則息方名曰鉛金也金生水故汞産于心雲從龍風從虎之理兆矣風平而雨降自然鉛汞相投相吞相啖金生水水生木木又生火木愛金而金惡木乃交會之道也夫金尅木反有愛惡之意焉蓋金木之本性耳吾以本然之天故能用五行本然之性亦不過譬喻耳乃先天也五行在何處但不如是則不能達其理探取之道既明交會之理復露再有叮囑採取不可太緩太緩則老而不可用而後天之氣雜矣學人以交會圖參看則思過半矣詩曰醺醺和氣釀春風一點陽生恍惚中無自有生無勝有色從空裏色還空升於臍上鉛情見産自心源汞性通定裏見真真裏定坎離交會雨濛濛詩曰木為龍兮金為虎坎户生男引離女要知造化有根源不離真火生於子交會圖論恍兮惚兮中有象杳兮冥兮中有物古先哲常持此以警學者蓋恍惚冥定之象也惟定可以鍊丹不定而陽不生陽生之後不定而丹不結故才以意探鉛而遽止其意止有時而升有刻蓋始生無過一氣耳升于臍則為鉛故心斯意而無用矣鉛自能引汞汞自能尋鉛恍惚杳冥之中交姤之理畢矣我得師之口訣並泄之宜祕宜祕默而視之念勿出聲若有知道之士宿有善緣逢此玄機至寶之道凡遇口訣記而勿書書而勿見則某實戴其德余從師一十年凡有所得盡底陳露願與同志之士共寶之此乃玉淸金笥東極青華長生度世上品內鍊金丹寶訣玄律至嚴某不識避就撰為此書亦前三旬表奏天廷繼得報應始敢吐露下筆下筆之時心蠧蠧然而汗落于紙涕泣交零但願志士得之幸勿相纍同成勝果共證仙階吁知我者謂我心憂不知我者謂我何求幸心心相照某不勝禱告之至諸仙幸鑑探取交會口訣忘裏覓覓裏忘忘中見見中忘陽生矣忘中採採中忘忘裏升升裏見見裏變鉛成矣定中起意中升忘中用鉛引汞矣鉛合汞於內精㑹神於外交㑹矣鉛汞精神合而為一却將一念使之落黃庭歸鼎矣口訣中口訣打合鉛汞須用一意動採一陽須用以靜而生定莫怪平叔多兜攬却緣學者盡癡迷咦說盡來咄滿眼天花散亂飛門前流水浪聲微靑驄載取靑娥去頃刻靑驄獨自歸青娥在我巫峽雲生十二峰故宫簫管寂寥中星橋路隔靑山外若要相逢永不逢是性又是命或問孰為交姤曰採取圖心下一竅乃交㑹之地不可以有形求不可以無形取但鉛升之際陽氣上夫自氣穴降為一陽宫我採以意汞降之際㑹氣降為蓋汞鉛生鉛升於臍上為精光所燭故曰鉛鉛猶表也汞猶影也表動影隨故汞降以如之陽鉛之升不可謂之純陽中含精光為鉛蓋亦屬陰陰汞之降不可謂之純陰心生汞心為神含汞遇神光而後可用蓋亦屬陽陽中有陰陰中有陽二氣交感凝結不散遂成玄珠如黍米或問鉛乃一陽一陽乃先天一氣耳汞何物為之曰鉛與汞皆先天之物鉛乃先天氣汞乃先天靈此氣乃命之母此靈乃性之子可以曰鉛汞可以曰性命諸得道之宗師誰肯直泄至此又問曰心下一竅何竅耳曰混沌神房者此也乃精光目光之氣幻而為之精光華騰為目光垂為精雖元精然無日用之精則元精不見又如不信譬如有水則潮興白氣未聞白氣興於地也水乃精也白氣乃華也神雖元神然日用之神而不役然後元神見譬之皓月當天雲收而光始下燭清淨即無雲也乘光即照臨也精雖屬陰而精華屬陽目光屬陽而照於內則亦屬陰光華相遇而成一竅以氣感氣使二物㑹于其中物之成也有精氣焉有元氣焉工夫周足遂為真人蓋生生之意寓于此矣所以能靈而神者此也或曰然則交㑹之後安得此珠落于黃庭歸于鼎內曰二物聚時情性合五行全矣虎歸于山龍歸于淵目光還而精氣復此落于黃庭歸于鼎內㑹有關捩子麼恍恍惚惚萬孔生春祕祕祕此數言非正經原有乃學者有所得之謂也或問陽生于上遽止其意安保不復降曰大哉問黃庭之下有一丹室之門户也意生則上故陽升意止則一故陽則不可得而降矣爐鼎則在乎一之內正屬土故備五行之正氣成天地之全形也或問爐鼎之法曰黃庭之在人身如此至一陽上升如此珠落于其中之候如此即爐鼎也黃庭固屬土也至于中之中蓋屬土中之土也故落于其中而成鼎器五行各厚其基何謂厚其基夫母求子子戀母丹之法也皆取其本然之性既歸于鼎而氣各趍之如子之戀母故靜坐之中神光下垂則歸于鼎精華上升亦如之至於行住坐卧如龍養珠如雞抱卵而氣各歸之一身之脉絡皆為之務在乎勿忘而勿助長耳學道之士然乎其不然乎在某之丹法若是而已矣詩曰何勞姹女與嬰兒透徹分明說與伊身裏乾坤顛倒處壺中日月運行時要知一者為陽用須識一中作氣機天使紫陽來說盡後來何必更尋師真泄天機圖到這田地知這道理且莫歡喜咄未知如何想寶劍沉埋古獄邊虹光夜夜上衝天虎龍戰罷三田靜何處求他汞與鉛嗄嗄嗄嘻嘻嘻嘻且休認鹿為馬一箇玄珠在泥底牛女橋邊路不通河車運去杳無蹤憑誰問得頁消息吹徹重關藉巽風真泄天機圖論金丹之圖既成慮天機之尤祕且論五行之顛倒述水火之流行明藥材之進退體日月之循環余前所著三篇之文盡矣今慮夫學者未明故為此書此書也直泄天機洞見毫髮化頑石而成金點瓦礫而成玉不啻過也夫兩目為役神之舍顧瞻視矚神常不得離之兩耳為送神之地蓋百里之音聞于耳而神隨之而又去兩鼻為勞神之位隨機而辨之者誰神也使耳目口鼻皆如眉則神豈不安而全之夫如是則不為後天也亦不勞修鍊也大抵忘於目則神歸于鼎而燭於內蓋綿綿若存之時目垂而下顧也忘於耳則神歸于鼎而聞於內蓋綿綿若存之時耳內聽於下也忘於鼻則神歸于鼎而吸於內蓋真息既定之時氣歸元海之理合而言之俱忘而俱歸于鼎而合於內矣還更有口訣麼口訣雞能抱卵心常聽或問金丹之道耳目口鼻固亦得聞之矣心固不言可知也肝膽脾胃肺無用之物也還亦無用之中而有用者也余答之曰此固已到而後知其理但余誓以無隱夫何隱之有吾初從師亦叩矣師贈我以詩曰五湖風景闊漫漫鷺立沙灘宇宙寬畫出枉勞君指點異時游到儘堪看余初未達此理後到此田地始信師言之不我欺也今以師不言之者並言之夫五行之用不可缺一故綿綿若存之頃脾氣與胃氣相接而歸於心縷肝氣與膽氣相接後大小腸接於腎縷肺氣伏心氣而通於鼻是氣也皆靜定之餘元氣周流自東而西自南而北之氣也西南乃氣之會也氣合而歸于此却自夾脊直透上中丹田而降於腎腑兩腎中間有治命橋一帶故寒山子曰上有接神窟橫安治命橋者此也氣降至于此陽氣與精氣盛而上衝與此氣相接於一則固圍於鼎器之外日用之則日增經營之力故鄞鄂之成肇於此也忽然有一物超然而出不內不外金丹之事不言可知矣一半玄之又玄一半者何也曰金丹之士到此則一半矣超然而出者乃玄關一竅也其大無外其小無內有形之中也無形之中也先就有形之中尋無形之中乃因命而見性也就無形之中尋有形之中乃因性而見命也先性固難先命則有下手處譬之萬里雖遠有路耳先性則如水中捉月然及其成功一也先性者或又有勝焉彼以性制命我以命制性故也未容輕議用力不得到者知其然也未見不必存之以有恐至著相或又曰子畫圖中多有竅何也曰斯竅也非探取交㑹圖中之竅也蓋一陰一陽之謂道往來不可窮用之則充塞于一身之中此物之作用不用則歸藏於心田之側了無形像然則何物耳意之主耳左屬陽右屬陰祕祕祕祕到這裏方是返太極處曰返太易者自太極返太極者自太和致太和者自陰陽始故曰陰陽和而風雨時嘉禾生者譬之若此大衍五十天數一地數二天三地四天五地六天七地八天九地十陽奇陰耦天數二十五地數三十合而為五十有五大衍之數五十去五以象五行者後之鼎內外是也又就其中尅一象太極之不動其用四十有九又就其中尅一以為鄞鄂其用四十有八學人行爐鼎用火之法以四卦為主以六十卦為用存乾坤坎離也又以大衍圖求其象則循環之理明矣周天之法泄矣如或未明更請看爐鼎圖論云一點蟾光照大虛金蟆水裏吸還噓高低猶是純陰體何事生陽用有餘論太虛寥廓皓月粲然雪浪翻騰金蟆吐耀人見月之所以明而曰金精精盛則月明焉孰知金丹之所以生者性也水者喻坎宫也金蟆者喻一點頁陽之竅也元性喻月性之用也性之初見如星大圓陀陀光爍爍未足以見性但氣質之性稍息而元性略見如雲開則月見頃合則亦然耳至於不時時存之則可沒與見未見時無以異也故金丹之士才見此物分明便是元氣産矣遂以而用之譬之見賊便捉毋使再逸然以之收於鼎器之中而一點元氣之真終乎不可得出矣以丹田為日以心中元性為月日光自返照月蓋交會之後寶體乃生金也月受日氣故初三生一陽者丹既居鼎覺一點靈光自心常照而無晝夜一陽生于月之八日而二陽産矣二陽者丹之金氣少旺而元性又少現自二陽生于月之望而三陽純矣三陽純者是所謂元性盡現即前謂無形之中也一陽純生時但覺吾身有一物或明或隱二陽生時則遍體生明矣三陽生者則光不在內不在外但覺此身如在虛空亦無身亦無虛空亦無日亦無月常能如此則禪定也但丹士若生於有而不能探頁空而以無為用也既至于此而金丹且半何也且元神見矣而未歸于丹混精氣而為一所以為半矣更說他後一半底道理月既望矣十六而一陰生一陰者性歸于命之始也自一陰生至于月之二十三而二陰産矣二陰者乃性歸于命三之二也自三陰生于月之三十日而三陰全矣三陰者乃性盡歸于命也性之全體見綿綿若存之性時時反乎命內矣方其始也以命而取性之全矣又以性安命此是性命天機括處雙修者此之謂也天機至密吾盡泄矣到此際則金丹全也始於火候凡一曰用度則一日養之百日之功而嬰兒産矣故吾以月為之喻取其交㑹相照之理也月明實本於金金之性實出於月百鍊愈堅萬劫不壤蓋金日色月性也火日氣金入火而復于元性之頁可以鍊成至寶號為金液還丹故修丹者始則取金為金生水交合之理顯而藉土以成之故城郭基址無非托頁金藥物而固濟隄防之鍊成純金故曰金丹鼎爐形象恁分明八卦縱橫用則親鍊就五行全藉土又令真土變真金爐鼎圖論鼎之為器匪金匪鐵爐之為具匪玉匪石黃庭為鼎氣穴為爐黃庭正在氣穴之上縷絡相連是為爐鼎陰陽為炭以烹以鍊夫黃庭之在人身上交㑹之頃乃元氣立之際此時正開而丹落于其中遂固之所謂水銀實滿葫蘆裏閉塞其口置深水者也水銀鉛汞也葫蘆黃庭也深水者水猶氣也閉塞黃庭隱藏丹母而置于氣㑹之地達者審之得其趣也虎嘯風生龍吟雲起蟋蟀吟秋蜉蝣顯陰萬氣歸鼎而封固愈密烹鍊愈堅此爐鼎之所以有也萬卷丹經要㫖畫圖立象本使人得象忘言後之學者皆泥象尋真各求詭論豈知夫至道不繁樞紐陰陽而已矣如以天一生水云云之數而言此亦不過明水火之流行耳如以四時八節而言者此亦不過喻天地陰陽消長耳祕其母而言其子故知之者鮮矣用成今所以著為此書者皆棄枝葉而言本根本根有而枝葉自芳蓋古人不欲言而余言之道中君子宜體此意母以小道觀焉依此而行神仙可立躋也或問爐鼎之體明矣爐鼎之用亦願聞焉天地間百卉草木萬類不殊冬至之後陽動於下則枯木重榮百草萌芽蟄蟲奮發萬類熙怡造化豈有心而生萬物萬物亦何心而望造化蓋一氣之動萬類感而然耳天何心哉物何心哉至于百卉開花結實之際正藥物循環之時落葉凋芳之際正藥物歸根復命之時可喻古人譬藥物産降而成丹莫有出於此者但不可泥於無心使其自浮自沉亦不可泥於有心而驅馳逐火綿綿若存知其無守其有知其黑守其白靜中行火候定裏結還丹贈之以中費盡工夫結得成返光內照景分明主人未至誰藏得聞道靈光駕赤城神室圖論神室者元神所居之室鄞鄂是也人知立鄞鄂之造化顯然彰露矣抑不知有室而無主人何取其為室哉然主人雖無而主人之胎亦在乎一室之中矣如懷孕然十月之間母呼亦呼母吸亦吸但氣未足耳氣足而形完一點靈光入于其中則倏然而生啼哭鎗然純乎其人矣此乃鄞鄂成而神歸于室之時也神歸其室則所謂得其一萬事畢矣蓋交媾之後神光乘而燭乎玄珠矣精華升而産于玄珠矣頁鉛則元氣矣精氣神亦先有胚胎在其中矣火足氣充則元精元氣元神盡合而為一故嬰兒産矣嬰兒豈即産焉火爍盡羣陰而胎始脫到此方是産嬰兒吾嘗謂古人畫鍊丹之圖象固鄞鄂也此一點便以安乎其中矣後之學者皆謂鄞鄂有而一點安遂不知安一點於中之道暫結終散猛火空燒而離坎逸矣夫此一點産于外而順于後天者一生二二生三三生萬物皆從此常人為之志反逆焉而産於內則長生久視之道存矣豈非歸根復命乎命復根歸之由深根固蒂也深根固蒂之道自澄心遣欲澄心之理屛視去聽始孔子曰非禮勿視非禮勿聽非禮勿言非禮勿動此便是真實道理但儒教欲行於世用於時故以禮為之防所謂妄心者喜怒哀樂各等耳忠恕慈順恤恭敬謹則為真心吾修丹之士則以真心並為妄心混然返其初而原其始却就無妄心中生一真念奮天地有為而終則至於無為也若釋氏之所謂頁心則又異焉放下六情了無一念性地廓然真元自見一見之頃往來自在蓋靜之極至于極之極故見太極則須用一言半句之間如死一場再生相似然後可以造化至機而為不生不死之根本豈易窺其門户耶玉清金笥青華祕文金寶內錬丹訣卷中
