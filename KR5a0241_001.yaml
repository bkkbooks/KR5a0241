front:
  text: 玉清金笥靑華祕文金寶內鍊丹訣卷上
  hash: sha256:0be36de3bfba30bd26da6a50442be22fdf3a9cf1288f7f0e99613626a3b43669
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0241_HFL_001-001a, image: hfl/0114/0114-004.png}
body:
  text: 紫陽真人張平叔撰表奏不避雷鉞之誅輒伸卑瀆念臣處世多虞無有所為為必顛躓年邁三旬獨於大道有緣焉回思穹蒼昔日使我無成者正佑今日之有成也感恩至重銘心戴德今者切見嘉爾下民孰無道器奔勞塵境𢦤伐真元俞降愈下棄人就物就物思人則不可得而返之矣物不能修終乎異類哀哉臣之身自弗能度反憐及此固無異泥中蛙而哂籬上雞也唯某昨傳受靑華真人玉清金笥長生度世金寶內鍊丹訣簡而易行詳而不雜身裏分陰陽之主壺中立四象之樞三中常守以為機一定不離而作用用中無用靜裏長存哲人秀士一覽無遺造化在掌中矣今欲齋沐精思著為圖論毫髮無隱直泄至真之奧旨擇其可傳者而傳之得接續心燈流傳萬世顧美事也然始傳之際誓語至嚴蒙師至囑輕泄犯刑數欲作而踟蹰勿記其幾矣伏惟太上好生度人為重是用俯伏塵埃冥心上界欲望天慈鑒臣之意若不允而立彰玄譴如或諒容俾臣安靜庶幾敢踐斯言復陳天陛臣無任誠惶誠恐頓首百拜懷恩之至臣邇者表奏天廷欲將青華真人玉清金笥長生度世金寶內鍊丹祕旨畫圖立論傳諸緣士俯伏茅廬恭伺天罰逾三旬焉今不至始敢齋沐焚香精思著述三日而成祕諸法笥以待賢者謹録上奏伏望天慈俯垂赦宥伏冀人人依此鍊成金寶超出塵埃世世相傳無有泄慢臣無任誠惶誠恐頓首百拜以聞金丹圖論序悛又為玄書並悟真篇等行於世自心為至矣忽有客至訪余怪其狀貌非凡敬肅待之或問曰子於金丹之道訓人亦至矣但首尾未明機關尚隱後學何以為識余自此亦不得已也天機至重玄律至嚴子固美言某敢不奉曰子但著為一書盡底泄漏苟有譴焉某當其責余再拜敬服遂失所在余思此語故著此書天機泄則泄矣傳之者當以至寶拜受有玄律焉泄慢墮地獄禍及七祖翁心為君論心者神之舍也心者衆妙之理而宰萬物也性在乎是命在乎是若夫學道之士先須了得這一箇宇其餘皆後段事矣故為之傳張子野人身披百衲自成都歸于故山築室於山靑水緑之中萬物罄然而怡怡然若有所得客傅於市曰遭貶張平叔歸于山矣從淤之士叢然而至立于庭且泣且拜曰先生固無恙乎且夫奔涉山川逾越險阻者于兹十年而貌不少衰形不少疲者其有術乎張子曰吁吾與汝言人之所以憔悴枯稿者誰使之然心也百事集之一念未已一念續之盡日之中全無頃暇宵之寐也則亦若無心焉但神不存矣吾本無他術為能定心故夫鬼神之所以測度者吾心之有念耳心無念則神之靈不可得而施也豈神不知吾心吾亦自不知其為心乃定之根本也弟子曰然則金丹之士其靜心乎勿靜心乎曰靜之一字能靜則金丹可坐而致也但難耳曰夫子之言其誤後學多矣張子矍然而請其旨曰夫子與人言金丹之道常使人心中生意以意為造化之主心其能靜乎曰子見偏耳非吾言之所誤也君尋其平日用心為何而動寂然不動感而遂通乃吾心之用也奔役天涯子無居止子用心也夫斗極之北辰固末始動其所以為動者拱之星耳然拱辰之星固不能動者斗極為之樞而運之爾性其不動之中而有所謂動者丹士之用心也唯其動之中而存不動者仁者之用心也於不動之中終於不動者土木之類也心居於中而兩目屬之兩腎屬之三竅屬之皆未可盡其妙用其所以為妙用者但神服其令氣服其竅精從其召神服其令者心勿馳於外則神反藏於內氣服其竅者心和則氣和氣和則形和形和則天地之和應矣故盛喜怒而氣逆者喜怒生乎心也精從其召者如男女構形而精蕩亦心使之然心清即念清念清則精止吁心惟靜則不外馳心惟靜則和心惟靜則清一言以蔽之曰靜精氣神始得而用矣精氣神之所以為用者心靜極則生動也非平昔之所謂動也用精氣神於內之動也精固精氣固氣神亦可謂性之基也性則性而基言之何也蓋心靜則神全神全則性現又一言以蔽之曰靜其所以為靜者蓋亦有理順水行舟滔滔騰拔欲往海島不曰勞形一旦回家思鄉安靜急駕歸帆求風逆返還家固靜之道但久違而始復久失而始尋一旦欲靜其可得乎當思歸靜之由然後能靜既悟昨非當求今是非固常為是在何處詩曰自下金梯墮碧崖回思閬苑幾花開向來大道今何在野草不除荆棘堆口訣但於一念妄生之際思平日心不得靜者此為梗耳急捨之久久純熟夫妄念莫大於喜怒怒裏回思則不怒喜中知抑則不喜種種皆然久而自靜豈獨坐時然平是提百萬強兵但事至則理退則休亦可為靜之本以此靜心應事接物誰云誤事實自靈耳故曰以事鍊心情無他鏡能察形不差毫髮形去而鏡自鏡蓋事至而應之事去而心自心也口訣中口訣心不留事一靜可期此便是覓靜底路又詩曰得路欲歸休問遠看看信步莫煩心雲收將放金烏見一點靈光眼內眀心之所以不能靜者不可純謂之心蓋神亦役心心亦役神二者交相役而欲念生焉心求靜必先制眼眼者神遊之宅也神遊於眼而役於心故抑之於眼而使之歸于心則心靜而神亦靜矣目不亂視神返于心神返于心乃靜之本神為主論心為君者喻乎人君之在位一人有慶兆民賴之秦皇漢武為之則四海瘡痍堯舜禹湯為之則天下安逸民歌太平者何也聖人以無為而治天下則天地安肅庸人以有為而治天下則天下撓蓋心者君之位也以無為臨之則其所以動者元神之性耳以有為臨之則其所以動者欲念之性耳有為者日用之心無為者金丹之用心也以有為及乎無為然後以無為而利正事金丹之入門也夫神者有元神焉有欲神焉元神者乃先天以來一點靈光也欲神者氣稟之性也元神乃先天之性也形而後有氣質之性善反之則天地之性存焉自為氣質之性所蔽之後如雲掩月氣質之性雖定先天之性則無有然元性微而質性彰如君臣之不明而小人用事以蠹國也且父母構形而氣質具于我矣將生之際而元性始入父母以情而育我體故氣質之性每寓物而生情焉今則徐徐剗除主於氣質盡而本元始見本元見而後可以用事無他百姓日用乃氣質之性勝本元之性至本元之性勝氣質之性以氣質之性而用之則氣亦後天之氣也以本元性而用之則氣乃先天之氣也氣質之性本微自生以來日長日盛則日用常行無非氣質一旦反之矣自今已往先天之氣本微吾勿忘勿助長則日長日盛至乎純熟日用常行無非本體矣此得先天制後天而為用餘見神室圖論氣為用説先天氣後天氣得之者如癡如醉忘寢失寐吁元神見則元氣生蓋自太極既分稟得這一點靈光乃元性也元性是何物為之亦氣靈凝而靈耳故元性復而元氣生相感之理也元氣之生周流乎身而獨於腎府探而用之者何也夫腎府路徑直達氣穴黃庭者一也腎為精府精至直引精華而用之二也周流於他處則難覓至精府而可識三也心氣透腎意下則直至探之者易為力四也此四者故採真陽於腎府精從氣説神有元神氣有元氣精得無元精乎蓋精依氣生精實腎宫而氣融之故隨氣而升陽為鉛者此也精實而元氣不生元陽不見何益於我哉元神見而元氣生元氣生則元精産意為媒説意者豈特為媒而已金丹之道自始至終作用不可離也意生於心然心勿馳於意則可心馳於意末矣坎離説坎者腎宫也離者心田也坎靜屬水乃也動屬火乃一也離動為火乃也靜屬水乃一也交會之際心田靜而腎府動得非真陽在下而真陰在上乎况意生乎心而直下腎府乎陽生於腎而直升於黃庭乎故曰坎離顛倒若不顛倒而順行則心火而不靜則大地火坑之義明矣餘見交會圖下手工夫持心論於前然後參下手工夫於後蓋心始欲靜而欲念未息欲念者氣質性之所為也此性役頁性常切於目耳次之修丹之士心既無事則彼固無由而役之矣其所以役神者以外物誘之耳靜坐之際先行閉息之道閉息者夫人之一息一息未際而一息續之今則一息既生而抑後息後息受抑故續之緩緩焉久而息定抑息千萬不可動心動心則逐於息息未止而心已動矣言未既有笑于傍者曰迂哉此子教人無法抑息而又不動心得非以千鈎之物責負於人使之不用力可乎曰子且聽吾雖閉息而又存心則心不動而息亦息矣又此固閉息之道安保欲念不生乎曰至于生則末矣念之生也感物而動爾定中覺目有所睹則神役於目矣急收而返於內耳有所聽神役於耳矣急收內聽其他皆然問者曰聞一知二吾再知此理矣吾雖收神而又存心則神收而心本靜矣曰存心者養性也養性之始見不存則無所養無所養則終乎不見矣存心實自收心始所謂收神者蓋收心之餘用耳行之至久見如不見聞如不聞形心相忘合乎至道則元性彰露而元氣生矣精神論神者元性也余前所説神為主論蓋亦盡之矣今念夫修丹者凝神之法凝神之法不在乎前不在乎速故又為之論而後畫神室并論于後凝者以神於精氣之內精氣本相依而神亦戀之今獨重於神何也神者精氣之主丹士交會採取至于行火無非以神而用氣精苟先以神凝于氣之中則氣未可安神亦未肯戀氣而反害藥物矣且神元性也性方尋見尚未定搖搖揚揚進退存亡而子使凝之性豈能自凝其所以凝之者亦質之性而凝之也初云質而尋本性是可以質性而逐本性可乎哉今為學者蓋為凝神所誤何耶蓋神仙有下手先凝神之説故妄引以盲衆豈知其所謂凝神者蓋息念而返神於心於心之道神歸于心則性之全體見全體見而用之無非神用念念不離金丹故丹成而神自歸之何凝之有故曰凝神者神融於精氣也精氣神合而為一而陽神産矣則此際此身乃始為無用之物也誰曰不然吾聞於度師度師聞於遠師遠師聞於天幻丹説丹有幻丹者蓋學道之士不知正理而妄為探取交會故成幻丹幻丹者未靜心田遽探一陽故斯時也一陽實非真陽也乃呼吸之氣也精亦非元精乃淫泆之精也神亦非元神乃情欲之念也夫人方學道便欲為仙得非欲念乎以欲念而交會陽生此幻丹之所以有也精在腎府而若探之升至于臍上又無安頓處故逐氣而息於氣穴之右臍生於腎之縷與氣交結而止即自曰丹既自曰丹矣而精神而用著便是後天底物先天之物果安在哉謂之黃庭內爐外爐泥丸等竅皆先天立之後始見當此時在何處實未之有也傍風起影入海尋蟾守株待兔緣木求魚一旦敗露精蕩然而去先天又無主嗚呼非長生之丹乃促命之法也又有探氣而上遇心血氣血凝而為物亦曰幻丹若此者衆故舉以辨惑捉丹法金丹居內亦有走失者乎曰有有可捉之道乎曰有然非丹之走失也曰門户不堅而被其出也幻丹則有走失金丹安有此患曰金丹之出何以知之曰丹在鼎中備五行之正氣吾身五行之氣迫爐則相感而動一旦覺氣升外而內無相感乃丹不存也急須放下一場大靜並所謂爐鼎丹之在不在俱付之無何有或一日或一夜始覺其在何處或在心或在肝或在脾與腎身中百竅皆可藏之知其在彼處遂綿綿若存守之勿使之再去他處又一日之久始以意探取之則直降於陽宫又就陽宫如探取之時用意遂從舊徑直升陽於鼎矣造化玄微至此誰曰不然苟有云云者吾之師也神水華池説神水者即木液之謂也華池者臍中氣穴之下兩腎中間一竅絶肖黃庭穀氣就此而生精醫家所謂精穴者是也斯竅也少壯之士陽盛氣融則神水華池不過澆灌爐鼎洗滌脾胃周流潤氣穴而已元氣衰微精元枯竭者皆藉此以為丹本元氣既衰非元氣之衰也乃氣質之氣斫喪已甚邪欲之性念念不已先天又不得見後天亦不足為用羸尫之根殆起于此華池之竅乃生精而降於外腎者也氣壯則精多精多則華盛用之如有餘氣凋之士精元稿矣穀氣所臨不過産一等欷欷之水流歸腎府耳然我既靜矣元氣本無增減但華池無矣大藥三品而欠其一故陽生之際未直探之時以意斡歸尾閭自夾脊直透至泥丸故就精穴用精自然隨氣而升至午宫遇衆陽融之則精始可用然後降至於心就心取汞依然下自黃庭即落乎其中却用一意封固即綿綿若存以養之二者就其中自相吞啖而丹始成近有浙西一派雖少壯之士亦用此法而結丹但道在邇求諸遠耳然各執其是而已百竅説人之一身毛竅八萬四千氣宫三百八十四毛竅散屬氣宫臍中氣穴又為三百八十四宫之主降而陽宫皆而為精心為中田頂為上田舌下玄膺目中有銀海額之中眉之間口鼻之衡耳目之畔咽喉之側腰脅之中皆竅也余所謂丹之出者若此竅皆可藏也豈曰人身止有一二竅也此一二竅者衆之摳紐豈曰止乎斯而已矣此其體也用别著説于後玉清金笥青華祕文金寶內鍊丹訣卷上
